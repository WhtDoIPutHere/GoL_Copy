<!DOCTYPE html>
<html>
<head>
  <title>Game of Life - Final Ctrl Erase</title>
  <style>
    body { margin: 0; background: #111; color: white; font-family: sans-serif; }
    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 10px;
    }
    canvas { display: block; }
    button, input, select { margin: 5px; }

    #playBtn.paused { background: #aa3333; }
    #playBtn.running { background: #33aa33; }
  </style>
</head>
<body>

<div id="ui">
  <button id="playBtn" class="paused" onclick="togglePlay()">Paused</button>

  Speed: <input type="range" min="1" max="60" value="10" id="speed">

  Brush: <input type="range" min="1" max="10" value="1" id="brushSize">

  <button onclick="clearGrid()">Clear</button>

  <br>

  Pattern:
  <select id="patternSelect">
    <option value="draw">Draw</option>
    <option value="glider">Glider</option>
    <option value="blinker">Blinker</option>
    <option value="toad">Toad</option>
    <option value="beacon">Beacon</option>
    <option value="pulsar">Pulsar</option>
    <option value="lwss">LWSS</option>
    <option value="gosper">Glider Gun</option>
  </select>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let cellSize = 20;
let offsetX = 0;
let offsetY = 0;

let running = false;
let grid = new Set();

let drawing = false;
let panning = false;
let lastDrawnCell = null;

let eraseMode = false;
let mouseX = 0;
let mouseY = 0;

// Patterns
const patterns = {
  glider: [[0,1],[1,2],[2,0],[2,1],[2,2]],
  blinker: [[0,0],[1,0],[2,0]],
  toad: [[1,0],[2,0],[3,0],[0,1],[1,1],[2,1]],
  beacon: [[0,0],[1,0],[0,1],[3,2],[2,3],[3,3]],
  lwss: [[0,1],[0,3],[1,0],[2,0],[3,0],[4,0],[4,3],[1,4],[4,4]],
  pulsar: [
    [2,0],[3,0],[4,0],[8,0],[9,0],[10,0],
    [0,2],[5,2],[7,2],[12,2],
    [0,3],[5,3],[7,3],[12,3],
    [0,4],[5,4],[7,4],[12,4],
    [2,5],[3,5],[4,5],[8,5],[9,5],[10,5],
    [2,7],[3,7],[4,7],[8,7],[9,7],[10,7],
    [0,8],[5,8],[7,8],[12,8],
    [0,9],[5,9],[7,9],[12,9],
    [0,10],[5,10],[7,10],[12,10],
    [2,12],[3,12],[4,12],[8,12],[9,12],[10,12]
  ],
  gosper: [
    [0,4],[1,4],[0,5],[1,5],
    [10,4],[10,5],[10,6],
    [11,3],[11,7],
    [12,2],[12,8],
    [13,2],[13,8],
    [14,5],
    [15,3],[15,7],
    [16,4],[16,5],[16,6],
    [17,5],
    [20,2],[20,3],[20,4],
    [21,2],[21,3],[21,4],
    [22,1],[22,5],
    [24,0],[24,1],[24,5],[24,6],
    [34,2],[34,3],[35,2],[35,3]
  ]
};

const key = (x,y)=>`${x},${y}`;
const parse = k=>k.split(',').map(Number);

// Draw
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="lime";

  for(let k of grid){
    let [x,y]=parse(k);
    let sx=x*cellSize+offsetX;
    let sy=y*cellSize+offsetY;

    if(sx>-cellSize && sy>-cellSize && sx<canvas.width && sy<canvas.height){
      ctx.fillRect(sx,sy,cellSize,cellSize);
    }
  }

  // Brush preview
  let brush = parseInt(document.getElementById("brushSize").value);
  let mode = document.getElementById("patternSelect").value;

  let gx = Math.floor((mouseX - offsetX)/cellSize);
  let gy = Math.floor((mouseY - offsetY)/cellSize);

  ctx.strokeStyle = eraseMode ? "red" : "white";
  ctx.globalAlpha = 0.5;
  ctx.lineWidth = 2;

  if(mode !== "draw"){
    ctx.strokeRect(
      gx*cellSize + offsetX,
      gy*cellSize + offsetY,
      cellSize * 5,
      cellSize * 5
    );
  } else {
    ctx.strokeRect(
      gx*cellSize - (brush-1)*cellSize + offsetX,
      gy*cellSize - (brush-1)*cellSize + offsetY,
      brush*2*cellSize - cellSize,
      brush*2*cellSize - cellSize
    );
  }

  ctx.globalAlpha = 1;
}

// Simulation
function getNeighbors(x,y){
  let n=0;
  for(let dx=-1;dx<=1;dx++){
    for(let dy=-1;dy<=1;dy++){
      if(dx||dy){
        if(grid.has(key(x+dx,y+dy))) n++;
      }
    }
  }
  return n;
}

function step(){
  let newGrid=new Set();
  let check=new Set();

  for(let k of grid){
    let [x,y]=parse(k);
    check.add(k);

    for(let dx=-1;dx<=1;dx++){
      for(let dy=-1;dy<=1;dy++){
        check.add(key(x+dx,y+dy));
      }
    }
  }

  for(let k of check){
    let [x,y]=parse(k);
    let n=getNeighbors(x,y);
    let alive=grid.has(k);

    if((alive&&(n===2||n===3))||(!alive&&n===3)){
      newGrid.add(k);
    }
  }

  grid=newGrid;
}

// Loop
let lastTime=0;
function loop(t){
  requestAnimationFrame(loop);

  let speed=document.getElementById("speed").value;

  if(running && t-lastTime>1000/speed){
    step();
    lastTime=t;
  }

  draw();
}
requestAnimationFrame(loop);

// UI
function togglePlay(){
  running=!running;
  updateButton();
}

function updateButton(){
  const btn=document.getElementById("playBtn");
  if(running){
    btn.textContent="Running";
    btn.className="running";
  } else {
    btn.textContent="Paused";
    btn.className="paused";
  }
}

function clearGrid(){ grid.clear(); }

// Keys
window.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    e.preventDefault();
    togglePlay();
  }
  if(e.key.toLowerCase()==="e"){
    eraseMode = !eraseMode;
  }
});

// Mouse
canvas.addEventListener("mousedown",e=>{
  if(e.button === 2 || e.shiftKey){
    panning=true;
  } else {
    drawing=true;
    running=false;
    updateButton();
    lastDrawnCell=null;
    place(e);
  }
});

canvas.addEventListener("mousemove",e=>{
  mouseX = e.clientX;
  mouseY = e.clientY;

  if(drawing) place(e);

  if(panning){
    offsetX+=e.movementX;
    offsetY+=e.movementY;
  }
});

canvas.addEventListener("mouseup",()=>{
  drawing=false;
  panning=false;
  lastDrawnCell=null;
});

canvas.addEventListener("contextmenu",e=>e.preventDefault());

// Place
function place(e){
  let brush=parseInt(document.getElementById("brushSize").value);
  let mode=document.getElementById("patternSelect").value;

  let x=Math.floor((e.clientX-offsetX)/cellSize);
  let y=Math.floor((e.clientY-offsetY)/cellSize);

  let k=key(x,y);
  if(k===lastDrawnCell) return;
  lastDrawnCell=k;

  if(mode!=="draw"){
    for(let [dx,dy] of patterns[mode]){
      grid.add(key(x+dx,y+dy));
    }
    return;
  }

  let erase = eraseMode;

  for(let dx=-brush+1;dx<brush;dx++){
    for(let dy=-brush+1;dy<brush;dy++){
      let cell=key(x+dx,y+dy);
      if(erase) grid.delete(cell);
      else grid.add(cell);
    }
  }
}

// Zoom
canvas.addEventListener("wheel",e=>{
  let z=e.deltaY<0?1.1:0.9;
  let mx=e.clientX,my=e.clientY;

  offsetX=mx-(mx-offsetX)*z;
  offsetY=my-(my-offsetY)*z;

  cellSize*=z;
});

// Resize
window.addEventListener("resize",()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});
</script>

</body>
</html>
