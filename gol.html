<!DOCTYPE html>
<html>
<head>
  <title>Game of Life - Final Ctrl Erase</title>
  <style>
    body { margin: 0; background: #111; color: white; font-family: sans-serif; }
    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 10px;
    }
    #ui .row { display:flex; align-items:center; flex-wrap:wrap; gap:8px; }
    canvas { display: block; }
    button, input, select { margin: 5px; }

    #playBtn.paused { background: #aa3333; }
    #playBtn.running { background: #33aa33; }
    #gridBtn.paused { background: #aa3333; }
    #gridBtn.running { background: #33aa33; }
    #eraseBtn.paused { background: #aa3333; }
    #eraseBtn.running { background: #33aa33; }
    #fullCellBtn.paused { background: #aa3333; }
    #fullCellBtn.running { background: #33aa33; }
    #colorsBtn.paused { background: #aa3333; }
    #colorsBtn.running { background: #33aa33; }
    #heatmapBtn.paused { background: #aa3333; }
    #heatmapBtn.running { background: #33aa33; }
    #colorsBtn.paused { background: #aa3333; }
    #colorsBtn.running { background: #33aa33; }
  </style>
</head>
<body>

<div id="ui">
  <div class="row">
    <button id="playBtn" class="paused" onclick="togglePlay()">Paused</button>
    <button id="gridBtn" class="paused" onclick="toggleGrid()">Grid</button>
    <button id="eraseBtn" class="paused" onclick="toggleErase()">Erase</button>
    <button id="fullCellBtn" class="paused" onclick="toggleFullCell()">Full Cell</button>
    <button id="colorsBtn" class="paused" onclick="toggleColors()">Colors</button>
    <button id="heatmapBtn" class="paused" onclick="toggleHeatmap()">Heatmap</button>
    <button id="stepBtn" onclick="doStep()">Step</button>
    <button id="resetViewBtn" onclick="resetView()">Reset View</button>
    <button onclick="clearGrid()">Clear</button>
    <button onclick="window.open('https://conwaylife.appspot.com/library','_blank')" style="background: #445;">Pattern Library</button>
  </div>

  <div class="row">
    <label style="margin:0 6px 0 0;">Speed:</label>
    <input type="range" min="1" max="60" value="10" id="speed">

    <label style="margin:0 6px 0 0;">Brush:</label>
    <input type="range" min="1" max="10" value="1" id="brushSize">
  </div>

  <div class="row">
    <label style="margin:0 6px 0 0;">Pattern:</label>
    <select id="patternSelect">
      <option value="draw">Draw</option>
      <option value="glider" title="3x3 oscillator">Glider</option>
      <option value="blinker" title="3x1 period-2">Blinker</option>
      <option value="toad" title="2x4 period-2">Toad</option>
      <option value="beacon" title="4x4 period-2">Beacon</option>
      <option value="pulsar" title="13x13 period-3">Pulsar</option>
      <option value="lwss" title="5x4 spaceship">LWSS</option>
      <option value="gosper" title="36x9 gun">Glider Gun</option>
      <option value="block" title="2x2 still">Block</option>
      <option value="beehive" title="Still life">Beehive</option>
      <option value="loaf" title="Still life">Loaf</option>
      <option value="boat" title="Still life">Boat</option>
      <option value="tub" title="Still life">Tub</option>
      <option value="rpentomino" title="Methuselah">R-Pentomino</option>
      <option value="acorn" title="Methuselah">Acorn</option>
    </select>

  </div>

  <div id="stats" style="font-size: 12px; margin-top: 8px;">
    Generation: <span id="genCount">0</span> | Living: <span id="liveCount">0</span>
  </div>

  <div style="display: flex; align-items: flex-start; margin-top: 8px;">
    <canvas id="graphCanvas" width="200" height="80" style="border: 1px solid #555;"></canvas>

    <div id="rulesMenu" style="margin-left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px;">
      <div style="margin-bottom: 5px;">
        <label>Born at <input type="number" id="bornInput" min="0" max="8" value="3" onchange="updateRules()"> neighbors</label>
      </div>
      <div style="margin-bottom: 5px;">
        <label>Overcrowded at <input type="number" id="overcrowdedInput" min="0" max="8" value="3" onchange="updateRules()"> neighbors</label>
      </div>
      <div style="margin-bottom: 5px;">
        <label>Lonely at <input type="number" id="lonelyInput" min="0" max="8" value="2" onchange="updateRules()"> neighbors</label>
      </div>
      <button id="resetRulesBtn" onclick="resetRules()">[Reset]</button>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let cellSize = 20;
let offsetX = 0;
let offsetY = 0;

let running = false;
let grid = new Set();
let generation = 0;

let drawing = false;
let panning = false;
let lastDrawnCell = null;
let lastDrawCoords = null;

let eraseMode = false;
let previousPattern = "draw";
let showGrid = false;
let fullCellMode = false;
let orthoAxis = null; // null = undecided, 'x' or 'y'
let colorMode = false;
let heatmapMode = false;
let populationHistory = [];
let cellAges = new Map();
let mouseX = 0;
let mouseY = 0;

// Patterns
const patterns = {
  glider: [[0,1],[1,2],[2,0],[2,1],[2,2]],
  blinker: [[0,0],[1,0],[2,0]],
  toad: [[1,0],[2,0],[3,0],[0,1],[1,1],[2,1]],
  beacon: [[0,0],[1,0],[0,1],[3,2],[2,3],[3,3]],
  lwss: [[0,1],[0,3],[1,0],[2,0],[3,0],[4,0],[4,3],[1,4],[4,4]],
  pulsar: [
    [2,0],[3,0],[4,0],[8,0],[9,0],[10,0],
    [0,2],[5,2],[7,2],[12,2],
    [0,3],[5,3],[7,3],[12,3],
    [0,4],[5,4],[7,4],[12,4],
    [2,5],[3,5],[4,5],[8,5],[9,5],[10,5],
    [2,7],[3,7],[4,7],[8,7],[9,7],[10,7],
    [0,8],[5,8],[7,8],[12,8],
    [0,9],[5,9],[7,9],[12,9],
    [0,10],[5,10],[7,10],[12,10],
    [2,12],[3,12],[4,12],[8,12],[9,12],[10,12]
  ],
  gosper: [
    [0,4],[1,4],[0,5],[1,5],
    [10,4],[10,5],[10,6],
    [11,3],[11,7],
    [12,2],[12,8],
    [13,2],[13,8],
    [14,5],
    [15,3],[15,7],
    [16,4],[16,5],[16,6],
    [17,5],
    [20,2],[20,3],[20,4],
    [21,2],[21,3],[21,4],
    [22,1],[22,5],
    [24,0],[24,1],[24,5],[24,6],
    [34,2],[34,3],[35,2],[35,3]
  ],
  block: [[0,0],[1,0],[0,1],[1,1]],
  beehive: [[1,0],[2,0],[0,1],[3,1],[1,2],[2,2]],
  loaf: [[1,0],[2,0],[0,1],[3,1],[1,2],[3,2],[2,3]],
  boat: [[0,0],[1,0],[0,1],[2,1],[1,2]],
  tub: [[1,0],[0,1],[1,1],[2,1],[1,2]],
  rpentomino: [[1,0],[2,0],[0,1],[1,1],[1,2]],
  acorn: [[1,0],[3,1],[0,2],[1,2],[4,2],[5,2],[6,2]]
};

const key = (x,y)=>`${x},${y}`;
const parse = k=>k.split(',').map(Number);

function getPatternBounds(pattern){
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for(let [dx,dy] of pattern){
    if(dx < minX) minX = dx;
    if(dy < minY) minY = dy;
    if(dx > maxX) maxX = dx;
    if(dy > maxY) maxY = dy;
  }
  return {minX, minY, maxX, maxY};
}

function getPatternAnchor(pattern){
  let bounds = getPatternBounds(pattern);
  let centerX = Math.floor((bounds.minX + bounds.maxX) / 2);
  let centerY = Math.floor((bounds.minY + bounds.maxY) / 2);
  return {bounds, centerX, centerY};
}

function getAgeColor(age){
  const baseColors = [
    'rgb(157,220,21)',  // young
    'rgb(255,213,57)',  // 2nd stage
    'rgb(245,143,32)',  // 3rd stage
    'rgb(202,32,77)'    // oldest
  ];

  if(heatmapMode){
    // Heatmap: gradient from cool to hot by age (clamp age 0..20)
    const maxAge = 20;
    const t = Math.min(age, maxAge) / maxAge;
    const r = Math.round(60 + (240 - 60) * t);
    const g = Math.round(180 - (180 - 40) * t);
    const b = Math.round(220 - (220 - 70) * t);
    return `rgb(${r},${g},${b})`;
  }

  if(colorMode){
    let index = Math.min(age, baseColors.length - 1);
    return baseColors[index];
  }

  return "lime";
}

// Draw
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let k of grid){
    let [x,y]=parse(k);
    let sx=x*cellSize+offsetX;
    let sy=y*cellSize+offsetY;
    // draw living cell inset so grid lines remain visible — leave only the grid line thickness gap
    const gridLineWidth = 1; // keep in sync with grid drawing below
    let padding = gridLineWidth / 2;
    let size = Math.max(1, cellSize - gridLineWidth);

    if(sx>-cellSize && sy>-cellSize && sx<canvas.width && sy<canvas.height){
      // Set fill style based on color or heatmap mode
      if(colorMode || heatmapMode){
        let age = cellAges.get(k) || 0;
        ctx.fillStyle = getAgeColor(age);
      } else {
        ctx.fillStyle = "lime";
      }

      if(fullCellMode){
        ctx.fillRect(sx - 1, sy - 1, cellSize + 2, cellSize + 2);
      } else {
        ctx.fillRect(sx + padding, sy + padding, size, size);
      }
    }
  }

  const minGridCellSize = 8; // below this, hide grid to reduce visual noise
  if(showGrid && cellSize >= minGridCellSize){
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    let startX = ((offsetX % cellSize) + cellSize) % cellSize;
    for(let x = startX; x <= canvas.width; x += cellSize){
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
    }
    let startY = ((offsetY % cellSize) + cellSize) % cellSize;
    for(let y = startY; y <= canvas.height; y += cellSize){
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
    }
    ctx.stroke();
  } else if(showGrid && cellSize < minGridCellSize) {
    // keep the helper state on, but do not draw the visual grid at extreme zoom levels
  }

  // Brush preview
  let brush = parseInt(document.getElementById("brushSize").value);
  let mode = document.getElementById("patternSelect").value;

  let gx = Math.floor((mouseX - offsetX)/cellSize);
  let gy = Math.floor((mouseY - offsetY)/cellSize);

  ctx.strokeStyle = eraseMode ? "red" : "white";
  ctx.globalAlpha = 0.5;
  ctx.lineWidth = 2;

  if(mode !== "draw" && patterns[mode]){
    let {bounds, centerX, centerY} = getPatternAnchor(patterns[mode]);
    ctx.strokeRect(
      (gx + bounds.minX - centerX) * cellSize + offsetX,
      (gy + bounds.minY - centerY) * cellSize + offsetY,
      (bounds.maxX - bounds.minX + 1) * cellSize,
      (bounds.maxY - bounds.minY + 1) * cellSize
    );
  } else if(mode === "draw"){
    ctx.strokeRect(
      gx*cellSize - (brush-1)*cellSize + offsetX,
      gy*cellSize - (brush-1)*cellSize + offsetY,
      brush*2*cellSize - cellSize,
      brush*2*cellSize - cellSize
    );
  }

  ctx.globalAlpha = 1;

  // Draw population graph
  const graphCanvas = document.getElementById("graphCanvas");
  const graphCtx = graphCanvas.getContext("2d");
  graphCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);

  if (populationHistory.length > 1) {
    graphCtx.strokeStyle = "lime";
    graphCtx.lineWidth = 1;
    graphCtx.beginPath();

    const maxPop = Math.max(...populationHistory);
    const scaleY = maxPop > 0 ? graphCanvas.height / maxPop : 1;
    const stepX = graphCanvas.width / (populationHistory.length - 1);

    for (let i = 0; i < populationHistory.length; i++) {
      const x = i * stepX;
      const y = graphCanvas.height - (populationHistory[i] * scaleY);
      if (i === 0) {
        graphCtx.moveTo(x, y);
      } else {
        graphCtx.lineTo(x, y);
      }
    }
    graphCtx.stroke();
  }
}

// Simulation
function getNeighbors(x,y){
  let n=0;
  for(let dx=-1;dx<=1;dx++){
    for(let dy=-1;dy<=1;dy++){
      if(dx||dy){
        if(grid.has(key(x+dx,y+dy))) n++;
      }
    }
  }
  return n;
}

function step(){
  let newGrid=new Set();
  let check=new Set();

  for(let k of grid){
    let [x,y]=parse(k);
    check.add(k);

    for(let dx=-1;dx<=1;dx++){
      for(let dy=-1;dy<=1;dy++){
        check.add(key(x+dx,y+dy));
      }
    }
  }

  for(let k of check){
    let [x,y]=parse(k);
    let n=getNeighbors(x,y);
    let alive=grid.has(k);

    if((alive&&(n===2||n===3))||(!alive&&n===3)){
      newGrid.add(k);
    }
  }

  grid=newGrid;

  // Update cell ages
  let newAges = new Map();
  for(let k of grid){
    newAges.set(k, cellAges.has(k) ? cellAges.get(k) + 1 : 0);
  }
  cellAges = newAges;

  generation++;
  updateStats();
  populationHistory.push(grid.size);
  if(populationHistory.length > 200) populationHistory.shift();
}

// Loop
let lastTime=0;
function loop(t){
  requestAnimationFrame(loop);

  let speed=document.getElementById("speed").value;

  if(running && t-lastTime>1000/speed){
    step();
    lastTime=t;
  }

  draw();
}
requestAnimationFrame(loop);

// UI
function togglePlay(){
  running=!running;
  updateButton();
}

function updateButton(){
  const btn=document.getElementById("playBtn");
  if(running){
    btn.textContent="Running";
    btn.className="running";
  } else {
    btn.textContent="Paused";
    btn.className="paused";
  }
}

function updateGridButton(){
  const btn=document.getElementById("gridBtn");
  if(showGrid){
    btn.textContent="Grid";
    btn.className="running";
  } else {
    btn.textContent="Grid";
    btn.className="paused";
  }
}

function toggleGrid(){
  showGrid = !showGrid;
  updateGridButton();
}

function updateFullCellButton(){
  const btn = document.getElementById("fullCellBtn");
  if(fullCellMode){
    btn.textContent = "Full Cell";
    btn.className = "running";
  } else {
    btn.textContent = "Full Cell";
    btn.className = "paused";
  }
}

function toggleFullCell(){
  fullCellMode = !fullCellMode;
  updateFullCellButton();
}
function updateHeatmapButton(){
  const btn = document.getElementById("heatmapBtn");
  if(heatmapMode){
    btn.textContent = "Heatmap";
    btn.className = "running";
  } else {
    btn.textContent = "Heatmap";
    btn.className = "paused";
  }
}

function toggleHeatmap(){
  heatmapMode = !heatmapMode;
  if(heatmapMode){
    colorMode = false;
    updateColorButton();
  }
  updateHeatmapButton();
}
function updateColorButton(){
  const btn = document.getElementById("colorsBtn");
  if(colorMode){
    btn.textContent = "Colors";
    btn.className = "running";
  } else {
    btn.textContent = "Colors";
    btn.className = "paused";
  }
}

function toggleColors(){
  colorMode = !colorMode;
  if(colorMode){
    heatmapMode = false;
    updateHeatmapButton();
  }
  updateColorButton();
}

function updateEraseButton(){
  const btn = document.getElementById("eraseBtn");
  if(eraseMode){
    btn.textContent = "Erase";
    btn.className = "running";
  } else {
    btn.textContent = "Erase";
    btn.className = "paused";
  }
}

function toggleErase(){
  const patternSelect = document.getElementById("patternSelect");

  if(!eraseMode){
    // Enter erase mode: remember current brush and switch to draw
    previousPattern = patternSelect.value;
    patternSelect.value = "draw";
    eraseMode = true;
  } else {
    // Exit erase mode: restore previous brush
    eraseMode = false;
    patternSelect.value = previousPattern || "draw";
  }

  updateEraseButton();
}

// If user changes brush while erase is active, disable erase
const patternSelectEl = document.getElementById("patternSelect");
patternSelectEl.addEventListener("change", (e) => {
  if(eraseMode && e.target.value !== "draw"){
    eraseMode = false;
    updateEraseButton();
  }
});

function clearGrid(){ 
  grid.clear();
  generation = 0;
  running = false;
  populationHistory = [];
  cellAges.clear();
  updateButton();
  updateStats();
}

function updateStats(){
  document.getElementById("genCount").textContent = generation;
  document.getElementById("liveCount").textContent = grid.size;
}

function doStep(){
  if(!running){
    step();
  }
}

function resetView(){
  cellSize = 20;
  offsetX = 0;
  offsetY = 0;
}

function updateRules() {
  bornRule = parseInt(document.getElementById("bornInput").value);
  maxSurvive = parseInt(document.getElementById("overcrowdedInput").value);
  minSurvive = parseInt(document.getElementById("lonelyInput").value);
}

function resetRules() {
  document.getElementById("bornInput").value = 3;
  document.getElementById("overcrowdedInput").value = 3;
  document.getElementById("lonelyInput").value = 2;
  updateRules();
}

updateGridButton();
updateFullCellButton();
updateEraseButton();
updateColorButton();
updateHeatmapButton();
updateStats();
updateRules();

// Keys
window.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    e.preventDefault();
    togglePlay();
  }

  if(e.key.toLowerCase()==="e"){
    e.preventDefault();
    toggleErase();
  }

  if(e.key.toLowerCase()==="f"){
    e.preventDefault();
    toggleFullCell();
  }

  if(e.key.toLowerCase()==="g"){
    toggleGrid();
  }
});

// Mouse
canvas.addEventListener("mousedown",e=>{
  if(e.button === 2){
    panning=true;
  } else {
    drawing=true;
    running=false;
    updateButton();
    lastDrawnCell=null;
    lastDrawCoords=null;
    orthoAxis = null;
    place(e);
  }
});

canvas.addEventListener("mousemove",e=>{
  mouseX = e.clientX;
  mouseY = e.clientY;

  if(drawing) place(e);

  if(panning){
    if(e.shiftKey){
      // constrain shift-panning to axis-aligned move (horizontal OR vertical)
      if(Math.abs(e.movementX) > Math.abs(e.movementY)){
        offsetX += e.movementX;
      } else {
        offsetY += e.movementY;
      }
    } else {
      offsetX += e.movementX;
      offsetY += e.movementY;
    }
  }
});

canvas.addEventListener("mouseup",()=>{
  drawing=false;
  panning=false;
  lastDrawnCell=null;
  lastDrawCoords=null;
  orthoAxis = null;
});

canvas.addEventListener("contextmenu",e=>e.preventDefault());

// Place
function paintCell(x,y,mode,brush,erase){
  if(mode!=="draw"){
    let {centerX, centerY} = getPatternAnchor(patterns[mode]);
    for(let [dx,dy] of patterns[mode]){
      grid.add(key(x + dx - centerX, y + dy - centerY));
    }
    return;
  }

  for(let dx=-brush+1;dx<brush;dx++){
    for(let dy=-brush+1;dy<brush;dy++){
      let cell=key(x+dx,y+dy);
      if(erase) grid.delete(cell);
      else grid.add(cell);
    }
  }
}

function place(e){
  let brush=parseInt(document.getElementById("brushSize").value);
  let mode=document.getElementById("patternSelect").value;
  let erase = eraseMode;

  let x=Math.floor((e.clientX-offsetX)/cellSize);
  let y=Math.floor((e.clientY-offsetY)/cellSize);

  let lineStart = lastDrawCoords || [x,y];
  let dx = x - lineStart[0];
  let dy = y - lineStart[1];

  if(e.shiftKey){
    if(orthoAxis === null){
      if(Math.abs(dx) > Math.abs(dy)){
        orthoAxis = 'x';
      } else if(Math.abs(dy) > Math.abs(dx)){
        orthoAxis = 'y';
      }
    }

    if(orthoAxis === 'x'){
      y = lineStart[1];
      dy = 0;
    } else if(orthoAxis === 'y'){
      x = lineStart[0];
      dx = 0;
    }
  } else {
    orthoAxis = null;
  }

  let steps = Math.max(Math.abs(dx), Math.abs(dy), 1);

  for(let i=0;i<=steps;i++){
    let tx = lineStart[0] + Math.round(dx * i / steps);
    let ty = lineStart[1] + Math.round(dy * i / steps);
    let k = key(tx,ty);

    if(k === lastDrawnCell && i !== steps) continue;
    lastDrawnCell = k;

    paintCell(tx, ty, mode, brush, erase);
  }

  lastDrawCoords = [x, y];
}

// Zoom
canvas.addEventListener("wheel",e=>{
  let z=e.deltaY<0?1.1:0.9;
  let mx=e.clientX,my=e.clientY;

  offsetX=mx-(mx-offsetX)*z;
  offsetY=my-(my-offsetY)*z;

  cellSize*=z;
});

// Resize
window.addEventListener("resize",()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});
</script>

</body>
</html>
