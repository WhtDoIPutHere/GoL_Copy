<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GoL Pattern Builder</title>
<style>
  body { margin:0; font-family: Arial, sans-serif; display:flex; height:100vh; }
  #left { flex:1; display:flex; flex-direction:column; }
  #controls { padding:10px; background:#222; color:#fff; display:flex; gap:10px; flex-wrap:wrap; }
  button, input, textarea { padding:5px; }
  #canvasContainer { flex:1; overflow:hidden; background:#111; }
  canvas { background:#111; cursor:crosshair; display:block; }
  #right { width:350px; background:#f4f4f4; padding:10px; overflow:auto; }
  textarea { width:100%; height:100px; }
  .pattern { border:1px solid #ccc; padding:5px; margin-bottom:5px; cursor:pointer; }
  .pattern.selected { background:#ddd; }
</style>
</head>
<body>

<div id="left">
  <div id="controls">
    <button id="drawBtn">Draw</button>
    <button id="eraseBtn">Erase</button>
    <button id="undoBtn">Undo</button>
    <button id="redoBtn">Redo</button>
    <button id="clearBtn">Clear</button>
    <input id="rleInput" placeholder="Paste RLE here" />
    <button id="importBtn">Import RLE</button>
    <button id="savePatternBtn">Save Pattern</button>
  </div>
  <div id="canvasContainer">
    <canvas id="canvas"></canvas>
  </div>
</div>

<div id="right">
  <h3>Pattern Metadata</h3>
  <input id="codename" placeholder="codename" /><br/><br/>
  <input id="viewname" placeholder="viewname" /><br/><br/>
  <input id="hovername" placeholder="hovername" /><br/><br/>

  <button id="exportSelected">Export Selected</button>
  <button id="exportAll">Export All</button>

  <h3>Patterns</h3>
  <div id="patternList"></div>

  <h3>Export Output</h3>
  <textarea id="output"></textarea>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Base grid settings
const baseCellSize = 10;
let zoom = 1;
const gridWidth = 80;
const gridHeight = 60;

// Fixed canvas size (does NOT change on zoom)
canvas.width = gridWidth * baseCellSize;
canvas.height = gridHeight * baseCellSize;

let grid = new Set();
let drawing = true;
let patterns = [];
let selectedPatternIndex = null;

let undoStack = [];
let redoStack = [];

function snapshot() {
  return new Set(grid);
}

function restore(state) {
  grid = new Set(state);
  draw();
}

function pushUndo() {
  undoStack.push(snapshot());
  redoStack = [];
}

function undo() {
  if (undoStack.length) {
    redoStack.push(snapshot());
    restore(undoStack.pop());
  }
}

function redo() {
  if (redoStack.length) {
    undoStack.push(snapshot());
    restore(redoStack.pop());
  }
}

function getCell(x, y) {
  return x + ',' + y;
}

function parseCoord(str) {
  return str.split(',').map(Number);
}

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = '#0f0';
  grid.forEach(cell => {
    const [x,y] = parseCoord(cell);
    ctx.fillRect(x*baseCellSize, y*baseCellSize, baseCellSize, baseCellSize);
  });

  ctx.strokeStyle = '#333';
  for(let x=0;x<gridWidth;x++){
    ctx.beginPath();
    ctx.moveTo(x*baseCellSize,0);
    ctx.lineTo(x*baseCellSize,canvas.height);
    ctx.stroke();
  }
  for(let y=0;y<gridHeight;y++){
    ctx.beginPath();
    ctx.moveTo(0,y*baseCellSize);
    ctx.lineTo(canvas.width,y*baseCellSize);
    ctx.stroke();
  }
}

function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  const scale = baseCellSize * zoom;
  return {
    x: Math.floor((e.clientX - rect.left) / scale),
    y: Math.floor((e.clientY - rect.top) / scale)
  };
}

canvas.addEventListener('mousedown', e => {
  pushUndo();
  const {x,y} = getMousePos(e);
  toggleCell(x,y);
});

canvas.addEventListener('mousemove', e => {
  if(e.buttons !== 1) return;
  const {x,y} = getMousePos(e);
  toggleCell(x,y);
});

// Zoom via CSS transform
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
  zoom *= zoomFactor;
  zoom = Math.max(0.2, Math.min(5, zoom));
  canvas.style.transform = `scale(${zoom})`;
  canvas.style.transformOrigin = '0 0';
});

function toggleCell(x,y){
  const key = getCell(x,y);
  if(drawing) grid.add(key);
  else grid.delete(key);
  draw();
}

// Buttons

document.getElementById('drawBtn').onclick = () => drawing = true;
document.getElementById('eraseBtn').onclick = () => drawing = false;
document.getElementById('undoBtn').onclick = undo;
document.getElementById('redoBtn').onclick = redo;
document.getElementById('clearBtn').onclick = () => {
  pushUndo();
  grid.clear();
  draw();
};

// RLE Import

function parseRLE(rle) {
  const lines = rle.split(/\n/).filter(l => !l.startsWith('#'));
  let data = lines.join('');
  let x = 0, y = 0;
  let num = '';
  let result = [];

  for (let char of data) {
    if (!isNaN(char)) {
      num += char;
    } else {
      let count = num ? parseInt(num) : 1;
      num = '';
      if (char === 'o') {
        for (let i=0;i<count;i++) result.push([x+i,y]);
        x += count;
      } else if (char === 'b') {
        x += count;
      } else if (char === '$') {
        y += count;
        x = 0;
      } else if (char === '!') {
        break;
      }
    }
  }
  return result;
}

function normalize(cells) {
  let minX = Math.min(...cells.map(c=>c[0]));
  let minY = Math.min(...cells.map(c=>c[1]));
  return cells.map(([x,y]) => [x-minX, y-minY]);
}

function loadCells(cells) {
  grid.clear();
  cells.forEach(([x,y]) => grid.add(getCell(x,y)));
  draw();
}

importBtn.onclick = () => {
  const rle = document.getElementById('rleInput').value;
  const cells = normalize(parseRLE(rle));
  pushUndo();
  loadCells(cells);
};

// Save Pattern

savePatternBtn.onclick = () => {
  const codename = document.getElementById('codename').value || 'pattern_'+(patterns.length+1);
  const viewname = document.getElementById('viewname').value || codename;
  const hovername = document.getElementById('hovername').value || codename;

  const cells = normalize([...grid].map(parseCoord));

  patterns.push({ codename, viewname, hovername, cells });
  renderPatternList();
};

function renderPatternList() {
  const list = document.getElementById('patternList');
  list.innerHTML = '';
  patterns.forEach((p,i)=>{
    const div = document.createElement('div');
    div.className = 'pattern' + (i===selectedPatternIndex?' selected':'');
    div.textContent = p.viewname;
    div.onclick = () => {
      selectedPatternIndex = i;
      renderPatternList();
    };
    list.appendChild(div);
  });
}

// Export

function exportPatterns(selectedOnly=false) {
  let selected = selectedOnly && selectedPatternIndex!==null
    ? [patterns[selectedPatternIndex]]
    : patterns;

  let optionText = '';
  let jsText = '';

  selected.forEach(p => {
    optionText += `<option value="${p.codename}" title="${p.hovername}">${p.viewname}</option>\n`;
    jsText += `${p.codename}: ${JSON.stringify(p.cells)},\n`;
  });

  document.getElementById('output').value = optionText + "\n-->\n" + jsText;
}

exportSelected.onclick = () => exportPatterns(true);
exportAll.onclick = () => exportPatterns(false);

function loop(){ draw(); requestAnimationFrame(loop); }
loop();

</script>
</body>
</html>
