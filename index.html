<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Game of Life Pattern Library</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: #eee;
  }

  header {
    padding: 15px;
    background: #1a1a1a;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  input {
    padding: 8px;
    width: 320px;
  }

  .container {
    padding: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    border-spacing: 0;
  }

  th {
    background: #222;
    cursor: pointer;
    position: sticky;
    top: 0;
    z-index: 5;
  }

  tr:nth-child(even) {
    background: #151515;
  }

  tr:nth-child(odd) {
    background: #111;
  }

  tr:hover {
    background: #222;
  }

  td, th {
    border-right: 1px solid #2a2a2a;
  }

  td:last-child, th:last-child {
    border-right: none;
  }

  .small {
    font-size: 12px;
    color: #aaa;
  }

  .pagination {
    padding: 10px;
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  button {
    background: #222;
    color: white;
    border: 1px solid #333;
    padding: 5px 10px;
    cursor: pointer;
  }

  button:hover {
    background: #333;
  }

  .active {
    background: #444;
  }

  /* === TABLE LAYOUT FIXES === */

.container {
  padding: 20px;
  max-width: 2000px;
  margin: 0 auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed; /* IMPORTANT: prevents column jumping */
}

/* ⭐ column */
th:nth-child(1), td:nth-child(1) { width: 40px; text-align: center; }

/* Name */
th:nth-child(2), td:nth-child(2) { width: 80px; }

/* Description stays flexible */
th:nth-child(3), td:nth-child(3) { width: auto; }

/* Rule */
th:nth-child(4), td:nth-child(4) { width: 100px; }

/* Cells */
th:nth-child(5), td:nth-child(5) { width: 80px; text-align: left;}

/* Bounding Box */
th:nth-child(6), td:nth-child(6) { width: 120px; }

/* DESCRIPTION TAKES REMAINING SPACE */
th:nth-child(2), td:nth-child(2) { width: auto; }

th, td {
  padding: 10px 12px;
  border-bottom: 1px solid #333;
  border-right: 1px solid #2a2a2a;
  text-align: left;
  font-size: 13px;
  overflow: hidden;
  text-overflow: ellipsis;
}

  /* keep single-line behavior for non-description */
td:not(.desc) {
  white-space: nowrap;
}

th:last-child, td:last-child {
  border-right: none;
}

/* alternating row colors */
tbody tr:nth-child(odd) {
  background: #151515;
}

tbody tr:nth-child(even) {
  background: #101010;
}

/* nicer hover */
tbody tr:hover {
  background: #222;
}

/* DESCRIPTION CLAMP */
.desc {
  display: -webkit-box;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: help;
  min-height: 1.4em;
}

.rule {
  color: #8ecae6;
  font-family: monospace;
}

.bbox {
  color: #90be6d;
  font-family: monospace;
}

.num {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

td {
  line-height: 1.3;
}

button {
  background: #222;
  color: white;
  border: 1px solid #333;
  padding: 5px 10px;
  cursor: pointer;
}

button:hover {
  background: #333;
}

#tab-all.active,
#tab-recent.active,
#tab-favorites.active {
  background: #555;
}

</style>
</head>
<body>

<header>
  <h3 style="margin:0; ">Pattern Library</h3>
  <input id="search" placeholder="Search patterns..." />
  <button onclick="setTab('all')" id="tab-all">All</button>
  <button onclick="setTab('recent')" id="tab-recent">Recent</button>
  <button onclick="setTab('favorites')" id="tab-favorites">Favorites</button>
  <button onclick="window.location.href='gol.html'">Go to Game of Life</button>
</header>

<div class="container">
  <table>
    <thead>
      <tr>
        <th>★</th>
        <th onclick="sortBy('Name')" id="h-Name">Name</th>
        <th onclick="sortBy('Description')" id="h-Description">Description</th>
        <th onclick="sortBy('Rule')" id="h-Rule">Rule</th>
        <th onclick="sortBy('Cells')" id="h-Cells">Cells</th>
        <th onclick="sortBy('BBox')" id="h-BBox">Bounding Box</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="pagination" id="pagination"></div>
</div>

<script src="script.js"></script>

</body>
</html>
